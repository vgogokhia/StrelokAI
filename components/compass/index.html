<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            height: 150px;
            overflow: hidden;
        }

        #compass {
            text-align: center;
            cursor: pointer;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #4CAF50;
            user-select: none;
            height: 100px;
        }

        #deg {
            font-size: 42px;
            color: #4CAF50;
            font-weight: bold;
            margin: 5px 0;
        }

        #dir {
            font-size: 18px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div id="compass" onclick="apply()">
        <div style="font-size: 14px; color: #888;">🧭 COMPASS (tap to apply)</div>
        <div id="deg">---</div>
        <div id="dir">Initializing...</div>
    </div>

    <script>
        let currentHeading = null;
        let eventFired = false;

        function sendFrameHeight() {
            window.parent.postMessage({
                isStreamlitMessage: true,
                type: "streamlit:setFrameHeight",
                height: 150
            }, "*");
        }

        window.addEventListener("message", function (event) {
            if (event.data.type === "streamlit:render") {
                sendFrameHeight();
            }
        });

        window.parent.postMessage({
            isStreamlitMessage: true,
            type: "streamlit:componentReady",
            apiVersion: 1
        }, "*");

        function getDir(d) {
            if (d >= 337.5 || d < 22.5) return 'NORTH';
            if (d < 67.5) return 'NE';
            if (d < 112.5) return 'EAST';
            if (d < 157.5) return 'SE';
            if (d < 202.5) return 'SOUTH';
            if (d < 247.5) return 'SW';
            if (d < 292.5) return 'WEST';
            return 'NW';
        }

        function updateDisplay(h) {
            eventFired = true;
            h = Math.round(h);
            if (h < 0) h += 360;
            if (h >= 360) h -= 360;
            currentHeading = h;
            document.getElementById('deg').innerHTML = h + '°';
            document.getElementById('dir').innerHTML = getDir(h);
        }

        function handleOrientation(e) {
            let heading;
            if (e.webkitCompassHeading !== undefined) {
                heading = e.webkitCompassHeading;
            } else if (e.alpha !== null) {
                heading = 360 - e.alpha;
            }
            if (heading !== undefined) updateDisplay(heading);
        }

        function apply() {
            if (currentHeading !== null) {
                // Send value back to streamit
                window.parent.postMessage({
                    isStreamlitMessage: true,
                    type: "streamlit:setComponentValue",
                    value: { heading: currentHeading, timestamp: new Date().getTime() }
                }, "*");
            }
        }

        function startCompass() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(r => {
                    if (r === 'granted') {
                        window.addEventListener('deviceorientationabsolute', handleOrientation);
                        window.addEventListener('deviceorientation', handleOrientation);
                    } else document.getElementById('dir').innerHTML = 'Permission denied';
                }).catch(() => document.getElementById('dir').innerHTML = 'Tap to enable');
            } else if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', handleOrientation);
                window.addEventListener('deviceorientation', handleOrientation);
            } else {
                document.getElementById('dir').innerHTML = 'Not available';
            }

            setTimeout(() => {
                if (!eventFired) {
                    document.getElementById('deg').innerHTML = 'N/A';
                    document.getElementById('dir').innerHTML = 'No compass sensor detected';
                }
            }, 1000);
        }

        // initialize
        sendFrameHeight();
        setTimeout(startCompass, 200);
    </script>
</body>

</html>
